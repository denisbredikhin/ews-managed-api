# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:

    runs-on:  windows-latest
    permissions:
      contents: read
      checks: write

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
  
    - name: Set up .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'zulu' # Alternative distribution options are available.
    - name: Cache SonarQube Cloud packages
      uses: actions/cache@v4
      with:
        path: ~\sonar\cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar
    - name: Cache SonarQube Cloud scanner
      id: cache-sonar-scanner
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}\scanner
        key: ${{ runner.os }}-sonar-scanner
        restore-keys: ${{ runner.os }}-sonar-scanner
    - name: Install SonarQube Cloud scanner
      if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory
        dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner
    - name: Build and analyze
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      shell: powershell
      run: |
        ${{ runner.temp }}\scanner\dotnet-sonarscanner begin /k:"denisbredikhin_ews-managed-api" /o:"denisbredikhin" /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
        dotnet build
        ${{ runner.temp }}\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

    - name: Restore .NET dependencies
      env:
        SOLUTION_PATH: Microsoft.Exchange.WebServices.Core.slnx
      run: dotnet restore "$SOLUTION_PATH"

    - name: Run unit tests
      env:
        SOLUTION_PATH: Microsoft.Exchange.WebServices.Core.slnx
      run: |
        dotnet test --configuration Release --no-restore \
          --solution "$SOLUTION_PATH" \
          --results-directory ./TestResults \
          --report-trx \
          --report-trx-filename test-results.trx \
          --coverage \
          --coverage-output-format cobertura \
          --coverage-output coverage.cobertura.xml

    - name: Upload unit test and coverage artifacts
      if: ${{ always() }}
      uses: actions/upload-artifact@v6
      with:
        name: test-results-ci-${{ github.run_id }}
        path: |
          **/TestResults/**/*.trx
          **/TestResults/**/coverage.cobertura.xml
        if-no-files-found: warn

    - name: Check TRX files
      if: ${{ always() }}
      id: trx_files
      run: |
        shopt -s globstar nullglob
        files=(**/TestResults/**/*.trx)
        if [ ${#files[@]} -gt 0 ]; then
          echo "has_trx=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_trx=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Publish unit test report
      if: ${{ always() && steps.trx_files.outputs.has_trx == 'true' }}
      continue-on-error: true
      uses: dorny/test-reporter@v2
      with:
        name: Unit Tests (ci)
        path: '**/TestResults/**/*.trx'
        reporter: dotnet-trx
        fail-on-error: 'false'
        fail-on-empty: 'false'
        list-suites: failed
        list-tests: failed

    - name: Publish missing test-results note
      if: ${{ always() && steps.trx_files.outputs.has_trx != 'true' }}
      run: echo "Unit test report was not generated because no TRX files were found." >> $GITHUB_STEP_SUMMARY

    - name: Check coverage files
      if: ${{ always() }}
      id: coverage_files
      run: |
        shopt -s globstar nullglob
        files=(**/TestResults/**/coverage.cobertura.xml)
        if [ ${#files[@]} -gt 0 ]; then
          echo "has_coverage=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_coverage=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Generate coverage report
      if: ${{ always() && steps.coverage_files.outputs.has_coverage == 'true' }}
      uses: danielpalme/ReportGenerator-GitHub-Action@5.5.1
      with:
        reports: '**/TestResults/**/coverage.cobertura.xml'
        targetdir: 'coveragereport'
        reporttypes: 'HtmlInline;MarkdownSummaryGithub'

    - name: Publish coverage summary
      if: ${{ always() }}
      run: |
        if [ "${{ steps.coverage_files.outputs.has_coverage }}" != "true" ]; then
          echo "Coverage report was not generated because no coverage files were found." >> $GITHUB_STEP_SUMMARY
        elif [ -f coveragereport/SummaryGithub.md ]; then
          cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
        else
          echo "Coverage summary was not generated." >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload coverage HTML report
      if: ${{ always() && steps.coverage_files.outputs.has_coverage == 'true' }}
      uses: actions/upload-artifact@v6
      with:
        name: coverage-report-ci-${{ github.run_id }}
        path: coveragereport
        if-no-files-found: warn

    - name: Build .NET projects
      env:
        SOLUTION_PATH: Microsoft.Exchange.WebServices.Core.slnx
      run: |
        dotnet build --configuration Release \
          --no-restore \
          "$SOLUTION_PATH"
